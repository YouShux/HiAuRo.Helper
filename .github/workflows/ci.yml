name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          $api = Invoke-RestMethod "https://api.github.com/repos/goatcorp/Dalamud/releases/latest"
          $asset = $api.assets | Where-Object { $_.name -like "*Dalamud.net10*.zip" } | Select-Object -First 1
          Invoke-WebRequest $asset.browser_download_url -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath dalamud

      - name: Build
        run: dotnet build HiAuRo.Helper.csproj -c Release
        env:
          DALAMUD_HOME: ${{ github.workspace }}\dalamud

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HiAuRo.Helper
          path: bin/Release/HiAuRo.Helper.dll

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: HiAuRo.Helper

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: HiAuRo.Helper.dll
          generate_release_notes: true
