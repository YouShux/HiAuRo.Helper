name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath dalamud

      - name: Build
        run: dotnet build HiAuRo.Helper.csproj -c Release
        env:
          DALAMUD_HOME: ${{ github.workspace }}\dalamud

      - name: Collect DLLs for NuGet
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build | Out-Null

          # HiAuRo.Helper (self-built)
          Copy-Item bin\Release\HiAuRo.Helper.dll build\

          # HiAuRo main framework
          $hiauro = Invoke-RestMethod "https://api.github.com/repos/denghaoxuan991876906/HiAuRo/releases/latest"
          $asset = $hiauro.assets | Where-Object { $_.name -eq "HiAuRo.Helper.dll" }
          if (-not $asset) { Write-Warning "No HiAuRo release found, skipping HiAuRo.dll" }
          # Fallback: download HiAuRo.zip from release
          $zipAsset = $hiauro.assets | Where-Object { $_.name -like "*.zip" } | Select-Object -First 1
          if ($zipAsset) {
            Invoke-WebRequest $zipAsset.browser_download_url -OutFile hiauro.zip
            Expand-Archive hiauro.zip -DestinationPath hiauro_tmp -Force
            Copy-Item hiauro_tmp\HiAuRo.dll build\ -ErrorAction SilentlyContinue
            Copy-Item hiauro_tmp\OmenTools.dll build\ -ErrorAction SilentlyContinue
          }

          # OmenTools (from submodule build)
          Copy-Item ..\OmenTools\bin\Release\OmenTools.dll build\ -ErrorAction SilentlyContinue

          # Dalamud DLLs
          Copy-Item dalamud\Dalamud.dll build\
          Copy-Item dalamud\Dalamud.Common.dll build\
          Copy-Item dalamud\Dalamud.Bindings.ImGui.dll build\
          Copy-Item dalamud\FFXIVClientStructs.dll build\
          Copy-Item dalamud\Lumina.dll build\
          Copy-Item dalamud\Lumina.Excel.dll build\
          Copy-Item dalamud\ImGui.NET.dll build\
          Copy-Item dalamud\ImGuiScene.dll build\
          Copy-Item dalamud\TerraFX.Interop.Windows.dll build\
          Copy-Item dalamud\Newtonsoft.Json.dll build\
          Copy-Item dalamud\Serilog.dll build\
          Copy-Item dalamud\CheapLoc.dll build\

      - name: Pack NuGet
        shell: pwsh
        run: |
          Invoke-WebRequest https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile nuget.exe
          .\nuget.exe pack HiAuRo.Sdk.nuspec -OutputDirectory nuget -BasePath .

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: HiAuRo.Sdk.nupkg
          path: nuget/*.nupkg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: HiAuRo.Sdk.nupkg

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push *.nupkg --source "https://nuget.pkg.github.com/denghaoxuan991876906/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.nupkg
          generate_release_notes: true
