name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

env:
  DEEPSEEK_MODEL: deepseek-v4-flash
  DEEPSEEK_API_BASE: https://api.deepseek.com

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: AI 审查 PR
        id: ai-review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python3 .github/scripts/pr_review.py

      - name: 发表审查评论
        if: ${{ steps.ai-review.outputs.verdict != 'SKIP' && steps.ai-review.outputs.verdict != 'ERROR' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment $PR_NUMBER --body-file review_body.md

      - name: 等待 CI 编译通过
        if: ${{ steps.ai-review.outputs.verdict == 'APPROVE' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "AI 审查通过，等待 CI 编译完成..."

          # 轮询 CI build check 状态，最长等待 10 分钟
          for i in $(seq 1 30); do
            STATUS=$(gh pr checks "$PR_NUMBER" --json name,conclusion -q '.[] | select(.name=="build") | .conclusion' 2>/dev/null || echo "")
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "✅ CI 编译通过！可以合并。"
              exit 0
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ CI 编译失败，取消自动合并"
              exit 1
            fi
            echo "  等待 CI 完成... ($i/30)"
            sleep 20
          done

          echo "❌ CI 超时未完成，取消自动合并"
          exit 1

      - name: 自动合并
        if: ${{ steps.ai-review.outputs.verdict == 'APPROVE' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "AI 审查通过 + CI 编译通过，合并 PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" --squash --delete-branch
